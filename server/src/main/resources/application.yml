spring:
  application:
    name: server

  datasource:
    url: jdbc:mysql://localhost:3306/flowre?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: flowre-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-expiration: 1800000    # 30분 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

aws:
  s3:
    access-key: your-access-key
    secret-key: your-secret-key
    region: ap-northeast-2
    bucket: flowre-bucket
  presigned-url-expiration: 600 # 10분 (초)

cors:
  allowed-origins: "http://localhost:8081,http://localhost:19006,http://localhost:3000"

logging:
  level:
    com.flowre: DEBUG
    org.springframework.security: DEBUG
